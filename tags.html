---
layout: default
title: "タグ一覧"
permalink: /tags/
---

<h1>タグ一覧</h1>

{% assign tags = site.tags | sort %}
{% for tag in tags %}
  <h2 id="{{ tag[0] }}">#{{ tag[0] }}</h2>
  <ul>
    {% for post in tag[1] %}
      <li><a href="{{ post.url | relative_url }}">{{ post.title }}</a></li>
    {% endfor %}
  </ul>
{% endfor %}
